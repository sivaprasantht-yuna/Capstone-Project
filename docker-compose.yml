version: '3.9'

services:
  # ─── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: capstone_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: capstone_db
      POSTGRES_USER: capstone_user
      POSTGRES_PASSWORD: capstone_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstone_user -d capstone_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: capstone_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Python AI Matching Service ────────────────────────────────────────────
  matching-service:
    build:
      context: ./matching-service
      dockerfile: Dockerfile
    container_name: capstone_matching
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstone_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/capstone_db
      SPRING_DATASOURCE_USERNAME: capstone_user
      SPRING_DATASOURCE_PASSWORD: capstone_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      APP_MATCHING_SERVICE_BASE_URL: http://matching-service:8001
      APP_JWT_SECRET: ${JWT_SECRET:-CapstoneHubSuperSecretKeyForJWTTokenGeneration2024!!!}
      APP_JWT_EXPIRATION_MS: 86400000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-demo}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      matching-service:
        condition: service_healthy

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capstone_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

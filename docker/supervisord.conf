[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:matching-service]
command=uvicorn main:app --host 0.0.0.0 --port %(ENV_PORT)s --workers 1
directory=/app/matching-service
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10
startsecs=3

[program:backend]
command=java -Xmx400m -Xss512k -jar /app/app.jar
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
startsecs=10
startretries=3

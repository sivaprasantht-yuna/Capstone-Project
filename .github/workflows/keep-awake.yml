name: Keep Hugging Face Awake

on:
  schedule:
    # Runs every 14 minutes to prevent HF Space from sleeping after inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space Backend
        run: |
          curl -sSf https://tgashwinyt-paatu-padava.hf.space/ || echo "Ping failed, but workflow continues"

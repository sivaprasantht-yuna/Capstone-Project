name: Keep Render Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -sSf https://capstonehub-backend.onrender.com/ || echo "Ping failed, but workflow continues"

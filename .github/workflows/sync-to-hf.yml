name: Sync Backend to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for a clean push

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git identity
          git config --global user.email "ci-bot@github-actions.com"
          git config --global user.name "GitHub Actions Bot"

          # Store credentials safely (avoids URL parsing issues with token characters)
          git config --global credential.helper store
          echo "https://TGAshwinYT:${HF_TOKEN}@huggingface.co" > ~/.git-credentials

          # Remove compiled JAR from git index — HF rejects files >10 MB.
          # HF will compile the JAR itself using the Dockerfile.
          git rm -r --cached backend/target/ 2>/dev/null || true
          git commit --allow-empty -m "ci: strip build artifacts before HF push"

          # Add HF Space as remote and force-push
          git remote add hf https://huggingface.co/spaces/TGAshwinYT/Paatu_Padava
          git push hf main:main --force


name: Sync Backend to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # Shallow clone — we'll create a fresh orphan anyway

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git identity
          git config --global user.email "ci-bot@github-actions.com"
          git config --global user.name "GitHub Actions Bot"

          # Store credentials safely
          git config --global credential.helper store
          echo "https://TGAshwinYT:${HF_TOKEN}@huggingface.co" > ~/.git-credentials

          # Delete compiled artifacts so they are never part of the push
          rm -rf backend/target/

          # Create a fresh orphan commit — no git history means no old JAR files.
          # HuggingFace only needs the source + Dockerfile, not the history.
          git checkout --orphan hf-deploy
          git add .

          # Generate the HF Space README with required YAML metadata (fixes repo card warning)
          cat > README.md << 'EOF'
---
title: CapstoneHub Backend
emoji: 🎓
colorFrom: blue
colorTo: indigo
sdk: docker
pinned: false
---

# CapstoneHub — Java Spring Boot Backend

Multi-Disciplinary Capstone Project Collaboration Platform.
Built with Spring Boot 3, PostgreSQL (Supabase), and deployed on Hugging Face Spaces.
EOF

          git add README.md
          git commit -m "Deploy: Java backend to HF Space (clean snapshot)"

          # Add HF Space remote and force-push the clean snapshot
          git remote add hf https://huggingface.co/spaces/TGAshwinYT/Paatu_Padava
          git push hf hf-deploy:main --force

name: Keep Hugging Face Backend Awake

on:
  schedule:
    # Ping every 14 minutes to prevent HF Space from sleeping after inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space Backend
        run: |
          echo "Pinging Hugging Face Space Backend to keep it awake..."
          # Ping the Spring Boot actuator health endpoint on HF Space
          curl -s -f --max-time 30 "https://tgashwinyt-paatu-padava.hf.space/actuator/health" || echo "Ping returned an error, but the space should be awake now."

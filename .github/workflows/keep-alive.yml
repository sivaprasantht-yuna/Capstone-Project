name: Keep Render Backend Awake

on:
  schedule:
    # Ping every 14 minutes to prevent Render free tier from sleeping (sleeps after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          echo "Pinging Render Backend to keep it awake..."
          # Ping the Spring Boot actuator health endpoint
          curl -s -f --max-time 30 "https://capstonehub-backend.onrender.com/actuator/health" || echo "Ping returned an error, but the space should be awake now."

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api/v1

# ─── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.iqkserylncujlyjtopsl
spring.datasource.password=sivaprasanth
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:capstone_super_secret_key_change_in_production_min_256bit}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:*}

# ─── Matching Service (Python FastAPI) ────────────────────────────────────────
app.matching-service.base-url=http://localhost:8000

# ─── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none
spring.cache.redis.time-to-live=3600000

# ─── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# ─── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Multipart (File Upload) ──────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.capstone=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
